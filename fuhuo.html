<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>龙脉复苏系统</title>
<style>
  *{
    margin:0;
    padding:0;
    box-sizing:border-box;
  }
  body{
    background:#000;
    background-image: radial-gradient(circle at center, #1a1a1a 0%, #000 80%);
    color:#E2C280;
    font-family: "KaiTi", "STKaiti", serif;
    min-height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    flex-direction:column;
    text-align:center;
    padding:20px;
  }
  .title{
    font-size:28px;
    letter-spacing:4px;
    margin-bottom:10px;
    text-shadow:0 0 10px #E2C280;
  }
  .subtitle{
    font-size:16px;
    opacity:0.8;
    margin-bottom:40px;
  }
  .process-box{
    width:100%;
    max-width:360px;
  }
  .line{
    display:flex;
    justify-content:space-between;
    font-size:14px;
    margin-bottom:8px;
  }
  .bar{
    width:100%;
    height:12px;
    background:#222;
    border:1px solid #444;
    margin-bottom:25px;
    overflow:hidden;
  }
  .bar-inner{
    width:0%;
    height:100%;
    background:#E2C280;
    transition: width 2s;
  }
  .btn{
    background:#000;
    color:#E2C280;
    border:2px solid #E2C280;
    padding:14px 36px;
    font-size:16px;
    font-family:"KaiTi",serif;
    letter-spacing:2px;
    cursor:pointer;
    margin-top:20px;
    text-shadow:0 0 6px #E2C280;
    box-shadow:0 0 12px #E2C280;
  }
</style>
</head>

<body>
  <div class="title">始皇帝·复苏程序</div>
  <div class="subtitle">龙脉能量同步中 · 请勿关闭页面</div>

  <div class="process-box">
    <div class="line">
      <span>骊山龙脉校准</span>
      <span>100%</span>
    </div>
    <div class="bar"><div class="bar-inner" style="width:100%"></div></div>

    <div class="line">
      <span>兵马俑阵激活</span>
      <span>98%</span>
    </div>
    <div class="bar"><div class="bar-inner" style="width:98%"></div></div>

    <div class="line">
      <span>帝王意识重构</span>
      <span>76%</span>
    </div>
    <div class="bar"><div class="bar-inner" style="width:76%"></div></div>

    <div class="line">
      <span>天下归一指令</span>
      <span>等待授权</span>
    </div>
    <div class="bar"><div class="bar-inner" id="final"></div></div>
  </div>

  <button class="btn" onclick="kaiqi()">启 · 动 · 复 · 苏</button>

<script>
  history.pushState(null, null, location.href);
  window.onpopstate = () => history.go(1);

  setTimeout(()=>{
    document.getElementById('final').style.width='100%';
  }, 1000);

  function kaiqi(){
    location.href="https://ys-api.mihoyo.com/event/download_porter/link/ys_cn_official/pc_default";
  }
</script>
</body>
</html>
